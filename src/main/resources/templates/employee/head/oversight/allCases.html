<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Надзор — Дела | АИС ГИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
    <script src="/js/tablePagination.js"></script>
    <script src="/js/tableSort.js"></script>
    <script src="/js/tableFilter.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <h1 class="page-title mb-0">Надзор — Судебные дела</h1>
                </div>
            </div>

            <div class="profile-card mb-4 p-3" th:if="${not #lists.isEmpty(allCases)}">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small">Поиск</label>
                        <input type="text" id="filterSearch" class="form-control form-control-sm" placeholder="Поиск по таблице...">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Статус дела</label>
                        <select id="filterStatus" class="form-select form-select-sm">
                            <option value="">Все</option>
                            <option th:each="cs : ${caseStatuses}" th:value="${cs.displayName}" th:text="${cs.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Дата с</label>
                        <input type="date" id="filterDateFrom" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Дата по</label>
                        <input type="date" id="filterDateTo" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Номер дела</label>
                        <input type="text" id="filterCaseNumber" class="form-control form-control-sm" placeholder="...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">ФИО ответственного</label>
                        <input type="text" id="filterExpertName" class="form-control form-control-sm" placeholder="...">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="button" id="filterReset" class="btn btn-outline-secondary btn-sm w-100">
                            <i class="bi bi-x-lg"></i> Сброс
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-container" th:if="${not #lists.isEmpty(allCases)}">
                <table id="casesTable" class="table table-modern">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th data-sortable data-sort-type="text">Номер дела</th>
                        <th data-sortable data-sort-type="date">Дата поступления</th>
                        <th data-sortable data-sort-type="text">Ответственный</th>
                        <th data-sortable data-sort-type="number">Образцов</th>
                        <th data-sortable data-sort-type="text">Статус</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c, index : ${allCases}">
                        <td class="row-number" th:text="${index.index + 1}"></td>
                        <td class="filter-case">
                            <a th:href="@{/employee/head/oversight/detailsCase/{id}(id=${c.id})}"
                               th:text="${c.caseNumber}"></a>
                        </td>
                        <td class="filter-date"
                            th:attr="data-date-iso=${c.receiptDate != null ? #temporals.format(c.receiptDate, 'yyyy-MM-dd') : ''}"
                            th:text="${c.receiptDate} ? ${#temporals.format(c.receiptDate, 'dd.MM.yyyy')} : '—'"></td>
                        <td class="filter-expert" th:text="${c.expertFullName} ?: '—'"></td>
                        <td th:text="${c.sampleCount}"></td>
                        <td class="filter-status">
                            <span class="badge-active" th:text="${c.statusDisplayName}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(allCases)}" class="text-center text-muted py-5">
                <i class="bi bi-folder2-open" style="font-size: 3rem;"></i>
                <p class="mt-2">Дела пока не зарегистрированы</p>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
<script th:if="${not #lists.isEmpty(allCases)}">
(function () {
    initSortable('casesTable');

    var dateFrom = document.getElementById('filterDateFrom');
    var dateTo = document.getElementById('filterDateTo');
    var caseInp = document.getElementById('filterCaseNumber');
    var expertInp = document.getElementById('filterExpertName');

    var tf = initTableFilter('casesTable', {
        perPage: 20,
        searchInput: document.getElementById('filterSearch'),
        selectFilters: [
            { element: document.getElementById('filterStatus'), cellSelector: '.filter-status', exact: true }
        ],
        resetButton: document.getElementById('filterReset')
    });

    function dateRangeFilter(row) {
        var cell = row.querySelector('.filter-date');
        var iso = cell ? cell.getAttribute('data-date-iso') : '';
        if (!iso) return !dateFrom.value && !dateTo.value;
        if (dateFrom.value && iso < dateFrom.value) return false;
        if (dateTo.value && iso > dateTo.value) return false;
        return true;
    }
    dateRangeFilter._isActive = function () { return !!(dateFrom.value || dateTo.value); };
    dateRangeFilter._reset = function () { dateFrom.value = ''; dateTo.value = ''; };

    function fieldContains(input, selector) {
        var fn = function (row) {
            var v = input.value.trim().toLowerCase();
            if (!v) return true;
            var cell = row.querySelector(selector);
            return cell && (cell.textContent || '').toLowerCase().indexOf(v) !== -1;
        };
        fn._isActive = function () { return input.value.trim() !== ''; };
        fn._reset = function () { input.value = ''; };
        return fn;
    }

    tf.addCustomFilter(dateRangeFilter);
    tf.addCustomFilter(fieldContains(caseInp, '.filter-case'));
    tf.addCustomFilter(fieldContains(expertInp, '.filter-expert'));

    [dateFrom, dateTo].forEach(function (el) { el.addEventListener('change', tf.refresh); });
    [caseInp, expertInp].forEach(function (el) { el.addEventListener('input', tf.refresh); });
})();
</script>
</body>
</html>
