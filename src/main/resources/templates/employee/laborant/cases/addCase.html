<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Добавить дело | АИС ГИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-12 col-lg-10">
                    <div class="profile-card p-4">

                        <h1 class="page-title">Добавить дело</h1>
                        <p class="page-subtitle">Заполните данные нового дела</p>

                        <div th:if="${caseError}" class="alert alert-danger" th:text="${caseError}"></div>

                        <form action="/employee/laborant/cases/addCase" method="post" class="auth-form">

                            <h6 class="form-section-title">Данные дела</h6>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">Номер дела *</label>
                                    <input type="text" class="form-control" readonly
                                           th:value="${previewCaseNumber}"
                                           title="Номер формируется автоматически при сохранении дела по формату Д-dd-MM-yy/N">
                                    <div class="form-text text-muted">
                                        <i class="bi bi-info-circle"></i>
                                        Формируется автоматически по формату <code>Д-dd-MM-yy/N</code>,
                                        где N — порядковый номер дела за сутки.
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Дата поступления</label>
                                    <input type="date" class="form-control" readonly
                                           th:value="${previewReceiptDate}"
                                           title="Дата поступления равна серверной дате на момент сохранения">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Дата вскрытия *</label>
                                    <input type="date" name="inputAutopsyDate" class="form-control"
                                           th:min="${previewReceiptDate}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Дата вырезки *</label>
                                    <input type="date" name="inputSamplingDate" class="form-control"
                                           th:min="${previewReceiptDate}" required>
                                </div>
                                <div class="col-md-9">
                                    <label class="form-label">ФИО *</label>
                                    <input type="text" name="inputPersonFullName" class="form-control"
                                           maxlength="200" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Год рождения *</label>
                                    <input type="number" name="inputBirthYear" class="form-control"
                                           min="1900" th:max="${T(java.time.LocalDate).now().getYear()}" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label">Описание</label>
                                    <textarea name="inputDescription" class="form-control" rows="3"
                                              placeholder="Краткое описание дела"></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Ответственный врач-гистолог</label>
                                    <select name="inputExpertId" class="form-select">
                                        <option value="">— Не назначен —</option>
                                        <option th:each="expert : ${allExperts}"
                                                th:value="${expert.id}"
                                                th:text="${expert.fullName}"></option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success btn-profile">
                                <i class="bi bi-check-lg"></i> Создать дело
                            </button>
                        </form>

                        <div class="link-section mt-3">
                            <a th:href="@{/employee/laborant/cases/allCases}">← К списку дел</a>
                        </div>

                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
