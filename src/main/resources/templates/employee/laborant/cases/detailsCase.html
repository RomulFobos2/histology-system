<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Карточка дела | АИС ГИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-12 col-lg-10">
                    <div class="profile-card p-4">

                        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-4">
                            <div>
                                <h1 class="page-title mb-1" th:text="'Дело № ' + ${caseDTO.caseNumber}"></h1>
                                <p class="page-subtitle mb-0" th:text="${caseDTO.statusDisplayName}"></p>
                            </div>
                            <div>
                                <span class="badge-active" th:text="${caseDTO.statusDisplayName}"></span>
                            </div>
                        </div>

                        <h6 class="form-section-title">Информация о деле</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <div class="text-muted small">Номер дела</div>
                                <div th:text="${caseDTO.caseNumber}"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Дата поступления</div>
                                <div th:text="${caseDTO.receiptDate} ? ${#temporals.format(caseDTO.receiptDate, 'dd.MM.yyyy')} : '—'"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Ответственный эксперт</div>
                                <div th:text="${caseDTO.expertFullName} ?: '— Не назначен —'"></div>
                            </div>
                            <div class="col-md-12" th:if="${caseDTO.description != null and !caseDTO.description.isEmpty()}">
                                <div class="text-muted small">Описание</div>
                                <div th:text="${caseDTO.description}"></div>
                            </div>
                        </div>

                        <div class="profile-actions mb-4">
                            <a th:href="@{/employee/laborant/cases/editCase/{id}(id=${caseDTO.id})}"
                               class="btn btn-primary btn-profile">
                                <i class="bi bi-pencil"></i> Редактировать
                            </a>
                            <a th:href="@{/employee/laborant/samples/addSample/{id}(id=${caseDTO.id})}"
                               class="btn btn-success btn-profile">
                                <i class="bi bi-plus-lg"></i> Добавить образец
                            </a>
                            <a th:if="${caseDTO.sampleCount == 0}"
                               th:href="@{/employee/laborant/cases/deleteCase/{id}(id=${caseDTO.id})}"
                               class="btn btn-danger btn-profile"
                               onclick="return confirm('Удалить это дело?')">
                                <i class="bi bi-trash"></i> Удалить
                            </a>
                        </div>

                        <!-- Образцы дела -->
                        <h6 class="form-section-title">Образцы (<span th:text="${#lists.size(caseSamples)}"></span>)</h6>

                        <div th:if="${#lists.isEmpty(caseSamples)}" class="text-muted mb-3">
                            Образцы ещё не добавлены.
                        </div>

                        <div th:unless="${#lists.isEmpty(caseSamples)}" class="table-container">
                            <table class="table table-modern">
                                <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Номер</th>
                                    <th>Тип ткани</th>
                                    <th>Метод окрашивания</th>
                                    <th>Статус</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="s, index : ${caseSamples}">
                                    <td th:text="${index.index + 1}"></td>
                                    <td>
                                        <a th:href="@{/employee/laborant/samples/detailsSample/{id}(id=${s.id})}"
                                           th:text="${s.sampleNumber}"></a>
                                    </td>
                                    <td th:text="${s.tissueTypeDisplayName}"></td>
                                    <td th:text="${s.stainingMethodDisplayName}"></td>
                                    <td>
                                        <span class="badge-active" th:text="${s.statusDisplayName}"></span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="link-section mt-3">
                            <a th:href="@{/employee/laborant/cases/allCases}">← К списку дел</a>
                        </div>

                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
