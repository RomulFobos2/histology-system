<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Редактировать протокол | АИС ГИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-12 col-lg-10">
                    <div class="profile-card p-4">

                        <h1 class="page-title">Редактировать протокол</h1>
                        <p class="page-subtitle">
                            Протокол № <span th:text="${protocolDTO.protocolNumber}"></span>
                            — Образец № <span th:text="${protocolDTO.sampleNumber}"></span>
                            (Дело № <span th:text="${protocolDTO.caseNumber}"></span>)
                        </p>

                        <div th:if="${protocolError}" class="alert alert-danger" th:text="${protocolError}"></div>

                        <form th:action="@{/employee/histologist/protocols/editProtocol/{id}(id=${protocolDTO.id})}"
                              method="post" class="auth-form">

                            <h6 class="form-section-title">Идентификация протокола</h6>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">Номер протокола *</label>
                                    <input type="text" class="form-control" readonly
                                           th:value="${protocolDTO.protocolNumber}"
                                           title="Номер протокола изменению не подлежит — сгенерирован автоматически при создании">
                                    <div class="form-text text-muted">
                                        <i class="bi bi-lock"></i>
                                        Номер протокола не изменяется после создания.
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Дата создания</label>
                                    <input type="date" class="form-control" readonly
                                           th:value="${protocolDTO.createdDate}"
                                           title="Дата создания изменению не подлежит — равна дате создания протокола">
                                    <div class="form-text text-muted">
                                        <i class="bi bi-lock"></i>
                                        Дата создания не изменяется.
                                    </div>
                                </div>
                            </div>

                            <h6 class="form-section-title">Текст протокола *</h6>
                            <div class="row g-3 mb-4">
                                <div class="col-md-12">
                                    <textarea name="inputProtocolText" class="form-control" rows="20"
                                              required th:text="${protocolDTO.protocolText}"></textarea>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success btn-profile">
                                <i class="bi bi-check-lg"></i> Сохранить изменения
                            </button>
                        </form>

                        <div class="link-section mt-3">
                            <a th:href="@{/employee/histologist/protocols/detailsProtocol/{id}(id=${protocolDTO.id})}">← К протоколу</a>
                            <span class="mx-2">|</span>
                            <a th:href="@{/employee/histologist/protocols/allProtocols}">Все протоколы</a>
                        </div>

                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
