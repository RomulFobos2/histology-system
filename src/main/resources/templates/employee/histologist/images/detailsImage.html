<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Изображение | АИС ГИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-12 col-lg-10">
                    <div class="profile-card p-4">

                        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-4">
                            <div>
                                <h1 class="page-title mb-1" th:text="${imageDTO.originalFilename}"></h1>
                                <p class="page-subtitle mb-0" th:text="'Образец № ' + ${imageDTO.sampleNumber} + ' — Дело № ' + ${imageDTO.caseNumber}"></p>
                            </div>
                            <div class="d-flex flex-column align-items-end gap-2">
                                <div class="d-flex flex-wrap gap-2 align-items-center">
                                    <span th:if="${imageDTO.enhanced}" class="badge-active">Улучшено</span>
                                    <span th:if="${imageDTO.enhanced and imageDTO.enhancementQuality != null}"
                                          id="qualityBadge"
                                          th:classappend="${imageDTO.enhancementQuality.name() == 'BAD' ? 'bg-danger' : (imageDTO.enhancementQuality.name() == 'GOOD' ? 'bg-warning text-dark' : 'bg-success')}"
                                          class="badge"
                                          th:text="'Оценка: ' + ${imageDTO.enhancementQualityDisplayName}"></span>
                                </div>
                                <button th:if="${imageDTO.enhanced}" type="button"
                                        class="btn btn-sm btn-outline-secondary"
                                        data-bs-toggle="modal" data-bs-target="#ratingModal">
                                    <i class="bi bi-pencil-square"></i> Изменить оценку
                                </button>
                            </div>
                        </div>

                        <!-- Превью -->
                        <div class="text-center mb-4">
                            <img th:src="@{/files/images/serve/{id}(id=${imageDTO.id})}"
                                 th:alt="${imageDTO.originalFilename}"
                                 style="max-width:100%; max-height:400px; border-radius:8px; border:1px solid var(--border); cursor:pointer;"
                                 th:onclick="'window.location.href=\'/employee/histologist/images/viewImage/' + ${imageDTO.id} + '\''">
                        </div>

                        <h6 class="form-section-title">Метаданные</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <div class="text-muted small">Имя файла</div>
                                <div th:text="${imageDTO.originalFilename}"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Размер</div>
                                <div th:text="${imageDTO.fileSizeFormatted}"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Формат</div>
                                <div th:text="${imageDTO.contentType}"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Дата загрузки</div>
                                <div th:text="${imageDTO.uploadDate} ? ${#temporals.format(imageDTO.uploadDate, 'dd.MM.yyyy')} : '—'"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Увеличение</div>
                                <div th:text="${imageDTO.magnification} ?: '—'"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small">Загрузил</div>
                                <div th:text="${imageDTO.uploadedByFullName} ?: '—'"></div>
                            </div>
                            <div class="col-md-12" th:if="${imageDTO.description != null and !imageDTO.description.isEmpty()}">
                                <div class="text-muted small">Описание</div>
                                <div th:text="${imageDTO.description}"></div>
                            </div>
                        </div>

                        <div class="profile-actions">
                            <a th:href="@{/employee/histologist/images/viewImage/{id}(id=${imageDTO.id})}"
                               class="btn btn-primary btn-profile">
                                <i class="bi bi-arrows-fullscreen"></i> Полноэкранный просмотр
                            </a>
                            <a th:href="@{/employee/histologist/autoencoder/dashboard}"
                               class="btn btn-outline-secondary btn-profile">
                                <i class="bi bi-cpu"></i> Панель автоэнкодера
                            </a>
                            <form th:action="@{/employee/histologist/images/enhance/{id}(id=${imageDTO.id})}"
                                  method="post" style="display:inline;" class="d-inline-flex align-items-center gap-2">
                                <select name="mode" class="form-select form-select-sm" style="width:auto;">
                                    <option value="neural">Нейросеть (U-Net)</option>
                                    <option value="baseline">Базовый (Pillow)</option>
                                </select>
                                <button type="submit" class="btn btn-warning btn-profile">
                                    <i class="bi bi-stars"></i> Улучшить
                                </button>
                            </form>
                            <a th:if="${compareOriginalId != null and compareEnhancedId != null}"
                               th:href="@{/employee/histologist/images/compare/{originalId}/{enhancedId}(originalId=${compareOriginalId}, enhancedId=${compareEnhancedId})}"
                               class="btn btn-outline-secondary btn-profile">
                                <i class="bi bi-columns-gap"></i> Сравнить
                            </a>
                        </div>

                        <div class="link-section mt-3">
                            <a th:href="@{/employee/histologist/images/allImages/{id}(id=${imageDTO.sampleId})}">← К изображениям</a>
                        </div>

                    </div>
                </div>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>

<!-- Модальное окно оценки качества улучшения -->
<div th:if="${imageDTO.enhanced}" class="modal fade" id="ratingModal" tabindex="-1" aria-labelledby="ratingModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="ratingModalLabel">
                    <i class="bi bi-stars"></i> Оцените качество улучшения
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-3">Ваша оценка поможет руководству оценить эффективность работы автоэнкодера. По умолчанию выставляется «Отлично».</p>
                <div class="d-flex flex-column gap-2">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="ratingChoice" id="ratingBad" value="BAD"
                               th:checked="${imageDTO.enhancementQuality != null and imageDTO.enhancementQuality.name() == 'BAD'}">
                        <label class="form-check-label" for="ratingBad">
                            <span class="badge bg-danger">Плохо</span> — заметные артефакты или потеря деталей
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="ratingChoice" id="ratingGood" value="GOOD"
                               th:checked="${imageDTO.enhancementQuality != null and imageDTO.enhancementQuality.name() == 'GOOD'}">
                        <label class="form-check-label" for="ratingGood">
                            <span class="badge bg-warning text-dark">Хорошо</span> — приемлемое качество, мелкие недочёты
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="ratingChoice" id="ratingExcellent" value="EXCELLENT"
                               th:checked="${imageDTO.enhancementQuality == null or imageDTO.enhancementQuality.name() == 'EXCELLENT'}">
                        <label class="form-check-label" for="ratingExcellent">
                            <span class="badge bg-success">Отлично</span> — заметное улучшение качества
                        </label>
                    </div>
                </div>
                <div id="ratingError" class="alert alert-danger mt-3 d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="ratingSubmit">
                    <i class="bi bi-check-lg"></i> Сохранить оценку
                </button>
            </div>
        </div>
    </div>
</div>

<script th:if="${imageDTO.enhanced}" th:inline="javascript">
    (function () {
        const imageId = /*[[${imageDTO.id}]]*/ 0;
        const autoOpen = /*[[${showRatingModal}]]*/ false;
        const modalEl = document.getElementById('ratingModal');
        if (!modalEl) return;
        const modal = new bootstrap.Modal(modalEl);

        if (autoOpen) {
            document.addEventListener('DOMContentLoaded', () => modal.show());
        }

        document.getElementById('ratingSubmit').addEventListener('click', async () => {
            const selected = document.querySelector('input[name="ratingChoice"]:checked');
            const errBox = document.getElementById('ratingError');
            errBox.classList.add('d-none');
            if (!selected) {
                errBox.textContent = 'Выберите оценку.';
                errBox.classList.remove('d-none');
                return;
            }
            try {
                const params = new URLSearchParams();
                params.append('quality', selected.value);
                const resp = await fetch('/employee/histologist/images/rate/' + imageId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
                const data = await resp.json();
                if (!resp.ok || !data.ok) {
                    errBox.textContent = data.error || 'Ошибка сохранения.';
                    errBox.classList.remove('d-none');
                    return;
                }
                // Обновляем бейдж без перезагрузки
                let badge = document.getElementById('qualityBadge');
                if (!badge) {
                    const container = document.querySelector('.d-flex.flex-wrap.gap-2.align-items-center');
                    badge = document.createElement('span');
                    badge.id = 'qualityBadge';
                    badge.className = 'badge';
                    container.appendChild(badge);
                }
                badge.className = 'badge ' + data.cssClass;
                badge.textContent = 'Оценка: ' + data.displayName;
                modal.hide();
            } catch (e) {
                errBox.textContent = 'Сетевая ошибка: ' + e.message;
                errBox.classList.remove('d-none');
            }
        });
    })();
</script>

</body>
</html>
