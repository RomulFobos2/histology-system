<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Заключения гистолога | АИС ГИ</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/javascript.js"></script>
    <script src="/js/tablePagination.js"></script>
    <script src="/js/tableSort.js"></script>
    <script src="/js/tableFilter.js"></script>
</head>
<body>
<div id="wrapper">
    <div th:insert="~{blocks/header :: sidebar}"></div>
    <div id="content-wrapper">
        <div th:insert="~{blocks/header :: topbar}"></div>
        <div th:insert="~{blocks/header :: overlay}"></div>
        <main class="container-fluid">

            <div class="profile-card mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <h1 class="page-title mb-0">Заключения гистолога</h1>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="profile-card mb-4 p-3" th:if="${not #lists.isEmpty(allConclusions)}">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small">Поиск</label>
                        <input type="text" id="filterSearch" class="form-control form-control-sm" placeholder="Поиск по таблице...">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Тип ткани</label>
                        <select id="filterTissue" class="form-select form-select-sm">
                            <option value="">Все</option>
                            <option th:each="tt : ${tissueTypes}" th:value="${tt.displayName}" th:text="${tt.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Метод</label>
                        <select id="filterStaining" class="form-select form-select-sm">
                            <option value="">Все</option>
                            <option th:each="sm : ${stainingMethods}" th:value="${sm.displayName}" th:text="${sm.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Дата с</label>
                        <input type="date" id="filterDateFrom" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Дата по</label>
                        <input type="date" id="filterDateTo" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Номер дела</label>
                        <input type="text" id="filterCaseNumber" class="form-control form-control-sm" placeholder="...">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Номер образца</label>
                        <input type="text" id="filterSampleNumber" class="form-control form-control-sm" placeholder="...">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Диагноз</label>
                        <input type="text" id="filterDiagnosis" class="form-control form-control-sm" placeholder="...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">ФИО гистолога</label>
                        <input type="text" id="filterHistologistName" class="form-control form-control-sm" placeholder="...">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="button" id="filterReset" class="btn btn-outline-secondary btn-sm w-100">
                            <i class="bi bi-x-lg"></i> Сброс
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-container" th:if="${not #lists.isEmpty(allConclusions)}">
                <table id="conclusionsTable" class="table table-modern">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th data-sortable data-sort-type="text">Образец</th>
                        <th data-sortable data-sort-type="text">Дело</th>
                        <th data-sortable data-sort-type="text">Тип ткани</th>
                        <th data-sortable data-sort-type="text">Метод</th>
                        <th data-sortable data-sort-type="text">Диагноз</th>
                        <th data-sortable data-sort-type="date">Дата</th>
                        <th data-sortable data-sort-type="text">Гистолог</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c, index : ${allConclusions}">
                        <td class="row-number" th:text="${index.index + 1}"></td>
                        <td class="filter-sample">
                            <a th:href="@{/employee/histologist/conclusions/detailsConclusion/{id}(id=${c.id})}"
                               th:text="${c.sampleNumber}"></a>
                        </td>
                        <td class="filter-case" th:text="${c.caseNumber}"></td>
                        <td class="filter-tissue" th:text="${c.tissueTypeDisplayName}"></td>
                        <td class="filter-staining" th:text="${c.stainingMethodDisplayName}"></td>
                        <td class="filter-diagnosis">
                            <span th:text="${#strings.abbreviate(c.diagnosis, 60)}"></span>
                        </td>
                        <td class="filter-date"
                            th:attr="data-date-iso=${c.conclusionDate != null ? #temporals.format(c.conclusionDate, 'yyyy-MM-dd') : ''}"
                            th:text="${c.conclusionDate} ? ${#temporals.format(c.conclusionDate, 'dd.MM.yyyy')} : '—'"></td>
                        <td class="filter-histologist" th:text="${c.histologistFullName}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(allConclusions)}" class="text-center text-muted py-5">
                <i class="bi bi-journal-medical" style="font-size: 3rem;"></i>
                <p class="mt-2">Заключения пока не созданы</p>
                <a th:href="@{/employee/histologist/samples/allSamples}" class="btn btn-primary">
                    <i class="bi bi-droplet"></i> Перейти к образцам
                </a>
            </div>

        </main>
        <div th:insert="~{blocks/footer :: footer}"></div>
    </div>
</div>
<script th:if="${not #lists.isEmpty(allConclusions)}">
(function () {
    initSortable('conclusionsTable');

    var dateFrom = document.getElementById('filterDateFrom');
    var dateTo = document.getElementById('filterDateTo');
    var caseInp = document.getElementById('filterCaseNumber');
    var sampleInp = document.getElementById('filterSampleNumber');
    var diagInp = document.getElementById('filterDiagnosis');
    var histInp = document.getElementById('filterHistologistName');

    var tf = initTableFilter('conclusionsTable', {
        perPage: 20,
        searchInput: document.getElementById('filterSearch'),
        selectFilters: [
            { element: document.getElementById('filterTissue'),   cellSelector: '.filter-tissue',   exact: true },
            { element: document.getElementById('filterStaining'), cellSelector: '.filter-staining', exact: true }
        ],
        resetButton: document.getElementById('filterReset')
    });

    function dateRangeFilter(row) {
        var cell = row.querySelector('.filter-date');
        var iso = cell ? cell.getAttribute('data-date-iso') : '';
        if (!iso) return !dateFrom.value && !dateTo.value;
        if (dateFrom.value && iso < dateFrom.value) return false;
        if (dateTo.value && iso > dateTo.value) return false;
        return true;
    }
    dateRangeFilter._isActive = function () { return !!(dateFrom.value || dateTo.value); };
    dateRangeFilter._reset = function () { dateFrom.value = ''; dateTo.value = ''; };

    function fieldContains(input, selector) {
        var fn = function (row) {
            var v = input.value.trim().toLowerCase();
            if (!v) return true;
            var cell = row.querySelector(selector);
            return cell && (cell.textContent || '').toLowerCase().indexOf(v) !== -1;
        };
        fn._isActive = function () { return input.value.trim() !== ''; };
        fn._reset = function () { input.value = ''; };
        return fn;
    }

    tf.addCustomFilter(dateRangeFilter);
    tf.addCustomFilter(fieldContains(caseInp, '.filter-case'));
    tf.addCustomFilter(fieldContains(sampleInp, '.filter-sample'));
    tf.addCustomFilter(fieldContains(diagInp, '.filter-diagnosis'));
    tf.addCustomFilter(fieldContains(histInp, '.filter-histologist'));

    [dateFrom, dateTo].forEach(function (el) { el.addEventListener('change', tf.refresh); });
    [caseInp, sampleInp, diagInp, histInp].forEach(function (el) { el.addEventListener('input', tf.refresh); });
})();
</script>
</body>
</html>
