<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ===== SIDEBAR ===== -->
<aside th:fragment="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-droplet-half"></i>
        <span>АИС ГИ</span>
    </div>
    <ul class="sidebar-nav">

        <!-- ========== ADMIN ========== -->
        <li sec:authorize="hasRole('ROLE_EMPLOYEE_ADMIN')">
            <div class="sidebar-heading">Администрирование</div>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYEE_ADMIN')">
            <a th:href="@{/employee/admin/users/allUsers}">
                <i class="bi bi-people"></i> <span>Пользователи</span>
            </a>
        </li>

        <!-- ========== HEAD ========== -->
        <li sec:authorize="hasRole('ROLE_EMPLOYEE_HEAD')">
            <div class="sidebar-heading">Руководство</div>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYEE_HEAD')">
            <a th:href="@{/employee/head/oversight/allCases}">
                <i class="bi bi-eye"></i> <span>Надзор</span>
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYEE_HEAD')">
            <a th:href="@{/employee/head/conclusions/allConclusions}">
                <i class="bi bi-file-earmark-medical"></i> <span>Заключения СМЭ</span>
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYEE_HEAD')">
            <a th:href="@{/employee/head/reports/dashboard}">
                <i class="bi bi-bar-chart-line"></i> <span>Отчёты</span>
            </a>
        </li>

        <!-- ========== HISTOLOGIST ========== -->
        <li sec:authorize="hasRole('ROLE_EMPLOYEE_HISTOLOGIST')">
            <div class="sidebar-heading">Гистология</div>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYEE_HISTOLOGIST')">
            <a th:href="@{/employee/histologist/samples/allSamples}">
                <i class="bi bi-droplet"></i> <span>Образцы</span>
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYEE_HISTOLOGIST')">
            <a th:href="@{/employee/histologist/conclusions/allConclusions}">
                <i class="bi bi-journal-medical"></i> <span>Заключения</span>
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYEE_HISTOLOGIST')">
            <a th:href="@{/employee/histologist/protocols/allProtocols}">
                <i class="bi bi-clipboard2-pulse"></i> <span>Протоколы</span>
            </a>
        </li>

        <!-- ========== LABORANT ========== -->
        <li sec:authorize="hasRole('ROLE_EMPLOYEE_LABORANT')">
            <div class="sidebar-heading">Лаборатория</div>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYEE_LABORANT')">
            <a th:href="@{/employee/laborant/cases/allCases}">
                <i class="bi bi-folder2-open"></i> <span>Дела</span>
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYEE_LABORANT')">
            <a th:href="@{/employee/laborant/samples/allSamples}">
                <i class="bi bi-droplet"></i> <span>Образцы</span>
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_EMPLOYEE_LABORANT')">
            <a th:href="@{/employee/laborant/journal/view}">
                <i class="bi bi-journal-text"></i> <span>Журнал</span>
            </a>
        </li>

        <!-- ========== ОБЩЕЕ ========== -->
        <li class="nav-item" sec:authorize="isAuthenticated()">
            <a th:href="@{/employee/profile}">
                <i class="bi bi-person-circle"></i> <span>Профиль</span>
            </a>
        </li>
    </ul>
</aside>

<!-- ===== TOPBAR ===== -->
<nav th:fragment="topbar" id="topbar">
    <div>
        <button id="sidebarToggle" class="topbar-toggler">
            <i class="bi bi-list"></i>
        </button>
    </div>
    <div class="topbar-user">
        <span class="topbar-user-name" sec:authorize="isAuthenticated()"
              sec:authentication="principal.fullName"></span>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-box-arrow-right"></i> Выход
            </button>
        </form>
    </div>
</nav>

<!-- ===== OVERLAY для mobile ===== -->
<div th:fragment="overlay" id="sidebarOverlay" class="sidebar-overlay"></div>

</html>
