<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ===== TOP NAVBAR ===== -->
<nav th:fragment="sidebar" class="top-navbar">
    <div class="navbar-inner">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-droplet-half"></i>
            <span>АИС ГИ</span>
        </a>

        <button class="navbar-toggler" id="navbarToggler" aria-label="Меню">
            <i class="bi bi-list"></i>
        </button>

        <div class="navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav">

                <!-- ADMIN -->
                <li class="nav-item nav-dropdown" sec:authorize="hasRole('ROLE_EMPLOYEE_ADMIN')">
                    <a href="#" class="nav-link">
                        <i class="bi bi-shield-lock"></i>
                        <span>Администрирование</span>
                        <i class="bi bi-chevron-down nav-arrow"></i>
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a th:href="@{/employee/admin/users/allUsers}" class="dropdown-link">
                                <i class="bi bi-people"></i> Пользователи
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- HEAD -->
                <li class="nav-item nav-dropdown" sec:authorize="hasRole('ROLE_EMPLOYEE_HEAD')">
                    <a href="#" class="nav-link">
                        <i class="bi bi-briefcase"></i>
                        <span>Руководство</span>
                        <i class="bi bi-chevron-down nav-arrow"></i>
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a th:href="@{/employee/head/oversight/allCases}" class="dropdown-link">
                                <i class="bi bi-eye"></i> Надзор
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/employee/head/conclusions/allConclusions}" class="dropdown-link">
                                <i class="bi bi-file-earmark-medical"></i> Заключения СМЭ
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/employee/head/reports/dashboard}" class="dropdown-link">
                                <i class="bi bi-bar-chart-line"></i> Отчёты
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- HISTOLOGIST -->
                <li class="nav-item nav-dropdown" sec:authorize="hasRole('ROLE_EMPLOYEE_HISTOLOGIST')">
                    <a href="#" class="nav-link">
                        <i class="bi bi-microscope"></i>
                        <span>Гистология</span>
                        <i class="bi bi-chevron-down nav-arrow"></i>
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a th:href="@{/employee/histologist/samples/allSamples}" class="dropdown-link">
                                <i class="bi bi-droplet"></i> Образцы
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/employee/histologist/conclusions/allConclusions}" class="dropdown-link">
                                <i class="bi bi-journal-medical"></i> Заключения
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/employee/histologist/protocols/allProtocols}" class="dropdown-link">
                                <i class="bi bi-clipboard2-pulse"></i> Протоколы
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- LABORANT -->
                <li class="nav-item nav-dropdown" sec:authorize="hasRole('ROLE_EMPLOYEE_LABORANT')">
                    <a href="#" class="nav-link">
                        <i class="bi bi-minecart-loaded"></i>
                        <span>Лаборатория</span>
                        <i class="bi bi-chevron-down nav-arrow"></i>
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a th:href="@{/employee/laborant/cases/allCases}" class="dropdown-link">
                                <i class="bi bi-folder2-open"></i> Дела
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/employee/laborant/samples/allSamples}" class="dropdown-link">
                                <i class="bi bi-droplet"></i> Образцы
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/employee/laborant/journal/view}" class="dropdown-link">
                                <i class="bi bi-journal-text"></i> Журнал
                            </a>
                        </li>
                    </ul>
                </li>

            </ul>

            <!-- Пользователь -->
            <div class="navbar-user" sec:authorize="isAuthenticated()">
                <a th:href="@{/employee/general/profile}" class="user-link">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="principal.fullName"></span>
                </a>
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="btn-logout">
                        <i class="bi bi-box-arrow-right"></i> Выход
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- Пустые фрагменты для совместимости со старыми шаблонами -->
<div th:fragment="topbar" id="topbar"></div>
<div th:fragment="overlay" id="sidebarOverlay"></div>

</html>
