<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ===== TOP NAVBAR (вставляется как sidebar-фрагмент для совместимости) ===== -->
<nav th:fragment="sidebar" class="top-navbar">
    <a class="navbar-brand" th:href="@{/}">
        <i class="bi bi-droplet-half"></i>
        <span>АИС ГИ</span>
    </a>

    <button class="navbar-toggler" id="navbarToggler">
        <i class="bi bi-list"></i>
    </button>

    <div class="navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav-list">

            <!-- ========== ADMIN ========== -->
            <li class="nav-dropdown" sec:authorize="hasRole('ROLE_EMPLOYEE_ADMIN')">
                <a href="#" class="nav-caret">
                    <i class="bi bi-shield-lock"></i> Администрирование
                </a>
                <div class="nav-dropdown-menu">
                    <a th:href="@{/employee/admin/users/allUsers}">
                        <i class="bi bi-people"></i> Пользователи
                    </a>
                </div>
            </li>

            <div class="nav-separator" sec:authorize="hasRole('ROLE_EMPLOYEE_ADMIN')"></div>

            <!-- ========== HEAD ========== -->
            <li class="nav-dropdown" sec:authorize="hasRole('ROLE_EMPLOYEE_HEAD')">
                <a href="#" class="nav-caret">
                    <i class="bi bi-briefcase"></i> Руководство
                </a>
                <div class="nav-dropdown-menu">
                    <a th:href="@{/employee/head/oversight/allCases}">
                        <i class="bi bi-eye"></i> Надзор
                    </a>
                    <a th:href="@{/employee/head/conclusions/allConclusions}">
                        <i class="bi bi-file-earmark-medical"></i> Заключения СМЭ
                    </a>
                    <a th:href="@{/employee/head/reports/dashboard}">
                        <i class="bi bi-bar-chart-line"></i> Отчёты
                    </a>
                </div>
            </li>

            <div class="nav-separator" sec:authorize="hasRole('ROLE_EMPLOYEE_HEAD')"></div>

            <!-- ========== HISTOLOGIST ========== -->
            <li class="nav-dropdown" sec:authorize="hasRole('ROLE_EMPLOYEE_HISTOLOGIST')">
                <a href="#" class="nav-caret">
                    <i class="bi bi-microscope"></i> Гистология
                </a>
                <div class="nav-dropdown-menu">
                    <a th:href="@{/employee/histologist/samples/allSamples}">
                        <i class="bi bi-droplet"></i> Образцы
                    </a>
                    <a th:href="@{/employee/histologist/conclusions/allConclusions}">
                        <i class="bi bi-journal-medical"></i> Заключения
                    </a>
                    <a th:href="@{/employee/histologist/protocols/allProtocols}">
                        <i class="bi bi-clipboard2-pulse"></i> Протоколы
                    </a>
                </div>
            </li>

            <div class="nav-separator" sec:authorize="hasRole('ROLE_EMPLOYEE_HISTOLOGIST')"></div>

            <!-- ========== LABORANT ========== -->
            <li class="nav-dropdown" sec:authorize="hasRole('ROLE_EMPLOYEE_LABORANT')">
                <a href="#" class="nav-caret">
                    <i class="bi bi-minecart-loaded"></i> Лаборатория
                </a>
                <div class="nav-dropdown-menu">
                    <a th:href="@{/employee/laborant/cases/allCases}">
                        <i class="bi bi-folder2-open"></i> Дела
                    </a>
                    <a th:href="@{/employee/laborant/samples/allSamples}">
                        <i class="bi bi-droplet"></i> Образцы
                    </a>
                    <a th:href="@{/employee/laborant/journal/view}">
                        <i class="bi bi-journal-text"></i> Журнал
                    </a>
                </div>
            </li>
        </ul>

        <div class="navbar-user" sec:authorize="isAuthenticated()">
            <span class="navbar-user-name" sec:authentication="principal.fullName"></span>
            <a th:href="@{/employee/profile}" class="btn-outline-light" style="text-decoration:none;">
                <i class="bi bi-person-circle"></i>
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline" style="margin:0;">
                <button type="submit" class="btn-outline-light">
                    <i class="bi bi-box-arrow-right"></i> Выход
                </button>
            </form>
        </div>
    </div>
</nav>

<!-- Пустые фрагменты для совместимости со старыми шаблонами -->
<div th:fragment="topbar" id="topbar"></div>
<div th:fragment="overlay" id="sidebarOverlay"></div>

</html>
